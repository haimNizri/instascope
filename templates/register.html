<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaScope — Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] }, colors: { dark: { 800: '#1a1a2e', 900: '#0f0f1a', 950: '#080812' }, accent: { 400: '#a78bfa', 500: '#8b5cf6', 600: '#7c3aed' } } } }
        }
    </script>
</head>
<body class="bg-dark-950 text-gray-100 font-sans min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md mx-4">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-extrabold bg-gradient-to-r from-accent-400 to-pink-400 bg-clip-text text-transparent">InstaScope</h1>
            <p class="text-gray-500 mt-2">Create your account</p>
        </div>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="bg-red-500/10 border border-red-500/30 rounded-xl p-3 mb-4 text-sm text-red-400">
            {% for msg in messages %}{{ msg }}{% endfor %}
        </div>
        {% endif %}
        {% endwith %}

        <form method="POST" class="bg-dark-800 rounded-2xl p-8 border border-gray-800 space-y-5">
            <div>
                <label class="block text-sm text-gray-400 mb-1">Email</label>
                <input type="email" name="email" required autofocus
                    class="w-full px-4 py-3 bg-dark-900 border border-gray-700 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:border-accent-500 focus:ring-1 focus:ring-accent-500"
                    placeholder="you@email.com">
            </div>
            <div>
                <label class="block text-sm text-gray-400 mb-1">Display Name</label>
                <input type="text" name="display_name"
                    class="w-full px-4 py-3 bg-dark-900 border border-gray-700 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:border-accent-500 focus:ring-1 focus:ring-accent-500"
                    placeholder="Your name">
            </div>
            <div>
                <label class="block text-sm text-gray-400 mb-1">Instagram Username</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500">@</span>
                    <input type="text" name="instagram_username"
                        class="w-full pl-10 pr-4 py-3 bg-dark-900 border border-gray-700 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:border-accent-500 focus:ring-1 focus:ring-accent-500"
                        placeholder="your_instagram">
                </div>
            </div>
            <div>
                <label class="block text-sm text-gray-400 mb-1">Password</label>
                <input type="password" name="password" required minlength="6"
                    class="w-full px-4 py-3 bg-dark-900 border border-gray-700 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:border-accent-500 focus:ring-1 focus:ring-accent-500"
                    placeholder="Min 6 characters">
            </div>
            <button type="submit"
                class="w-full py-3 bg-accent-600 hover:bg-accent-500 text-white font-semibold rounded-xl transition">
                Create Account
            </button>
        </form>

        <p class="text-center text-gray-500 text-sm mt-6">
            Already have an account? <a href="/login" class="text-accent-400 hover:underline">Sign in</a>
        </p>
    </div>
</body>
</html>
