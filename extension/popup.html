<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #FAFAFA;
      color: #1a1a1a;
      padding: 20px;
    }
    .logo {
      text-align: center;
      font-size: 20px;
      font-weight: 800;
      background: linear-gradient(to right, #7C5CFC, #2DD4A8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 4px;
    }
    .subtitle {
      text-align: center;
      color: #6B7280;
      font-size: 11px;
      margin-bottom: 16px;
    }
    .status {
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 12px;
      font-size: 13px;
      text-align: center;
    }
    .status.success { background: #ECFDF5; border: 1px solid #D1FAE5; color: #059669; }
    .status.error { background: #FEF2F2; border: 1px solid #FECACA; color: #DC2626; }
    .status.info { background: #F5F0FF; border: 1px solid #E8E0FF; color: #7C5CFC; }
    .status.warning { background: #FFFBEB; border: 1px solid #FEF3C7; color: #D97706; }
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 8px;
    }
    .btn-primary {
      background: linear-gradient(to right, #7C5CFC, #2DD4A8);
      color: white;
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary {
      background: white;
      color: #6B7280;
      border: 1px solid #E5E7EB;
    }
    .btn-secondary:hover { color: #1a1a1a; border-color: #7C5CFC; }
    .input-group {
      margin-bottom: 12px;
    }
    .input-group label {
      display: block;
      font-size: 11px;
      color: #6B7280;
      margin-bottom: 4px;
      font-weight: 500;
    }
    .input-group input {
      width: 100%;
      padding: 8px 12px;
      background: white;
      border: 1px solid #E5E7EB;
      border-radius: 8px;
      color: #1a1a1a;
      font-size: 13px;
      outline: none;
    }
    .input-group input:focus { border-color: #7C5CFC; box-shadow: 0 0 0 3px rgba(124, 92, 252, 0.12); }
    .input-group input::placeholder { color: #9CA3AF; }
    .connected-info {
      text-align: center;
      padding: 8px;
    }
    .connected-info .username {
      font-weight: 700;
      color: #7C5CFC;
      font-size: 16px;
    }
    .links {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .links a {
      flex: 1;
      text-align: center;
      padding: 8px;
      background: white;
      border: 1px solid #E5E7EB;
      border-radius: 8px;
      color: #6B7280;
      text-decoration: none;
      font-size: 11px;
      transition: all 0.2s;
    }
    .links a:hover { color: #1a1a1a; border-color: #7C5CFC; }
    #loginForm, #mainView { display: none; }
    .divider {
      text-align: center;
      color: #D1D5DB;
      font-size: 11px;
      margin: 8px 0;
    }
  </style>
</head>
<body>
  <div class="logo">IGAI</div>
  <div class="subtitle">Instagram Analytics</div>

  <div id="statusBox" class="status info">Checking status...</div>

  <!-- Login form (shown when not logged into IGAI) -->
  <div id="loginForm">
    <div class="input-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@email.com">
    </div>
    <div class="input-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Your password">
    </div>
    <button class="btn-primary" id="loginBtn" onclick="doLogin()">Sign In</button>
    <div class="divider">or</div>
    <button class="btn-secondary" onclick="openUrl('/register')">Create Account</button>
  </div>

  <!-- Main view (shown when logged in) -->
  <div id="mainView">
    <div class="connected-info" id="connectedInfo"></div>
    <button class="btn-primary" id="connectBtn" onclick="connectInstagram()">
      Connect Instagram
    </button>
    <div class="links">
      <a href="#" onclick="openUrl('/relationships/' + igUser)">Relationships</a>
      <a href="#" onclick="openUrl('/unfollowers/' + igUser)">Unfollowers</a>
      <a href="#" onclick="openUrl('/advisor/' + igUser)">Advisor</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
