<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e5e7eb;
      padding: 20px;
    }
    .logo {
      text-align: center;
      font-size: 20px;
      font-weight: 800;
      background: linear-gradient(to right, #a78bfa, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 4px;
    }
    .subtitle {
      text-align: center;
      color: #6b7280;
      font-size: 11px;
      margin-bottom: 16px;
    }
    .status {
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 12px;
      font-size: 13px;
      text-align: center;
    }
    .status.success { background: rgba(34, 197, 94, 0.1); border: 1px solid rgba(34, 197, 94, 0.3); color: #4ade80; }
    .status.error { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: #f87171; }
    .status.info { background: rgba(139, 92, 246, 0.1); border: 1px solid rgba(139, 92, 246, 0.3); color: #a78bfa; }
    .status.warning { background: rgba(234, 179, 8, 0.1); border: 1px solid rgba(234, 179, 8, 0.3); color: #facc15; }
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 8px;
    }
    .btn-primary {
      background: linear-gradient(to right, #8b5cf6, #ec4899);
      color: white;
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary {
      background: #1a1a2e;
      color: #9ca3af;
      border: 1px solid #374151;
    }
    .btn-secondary:hover { color: white; border-color: #8b5cf6; }
    .input-group {
      margin-bottom: 12px;
    }
    .input-group label {
      display: block;
      font-size: 11px;
      color: #6b7280;
      margin-bottom: 4px;
    }
    .input-group input {
      width: 100%;
      padding: 8px 12px;
      background: #1a1a2e;
      border: 1px solid #374151;
      border-radius: 8px;
      color: white;
      font-size: 13px;
      outline: none;
    }
    .input-group input:focus { border-color: #8b5cf6; }
    .connected-info {
      text-align: center;
      padding: 8px;
    }
    .connected-info .username {
      font-weight: 700;
      color: #a78bfa;
      font-size: 16px;
    }
    .links {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .links a {
      flex: 1;
      text-align: center;
      padding: 8px;
      background: #1a1a2e;
      border: 1px solid #374151;
      border-radius: 8px;
      color: #9ca3af;
      text-decoration: none;
      font-size: 11px;
      transition: all 0.2s;
    }
    .links a:hover { color: white; border-color: #8b5cf6; }
    #loginForm, #mainView { display: none; }
    .divider {
      text-align: center;
      color: #374151;
      font-size: 11px;
      margin: 8px 0;
    }
  </style>
</head>
<body>
  <div class="logo">InstaScope</div>
  <div class="subtitle">Instagram Analytics</div>

  <div id="statusBox" class="status info">Checking status...</div>

  <!-- Login form (shown when not logged into InstaScope) -->
  <div id="loginForm">
    <div class="input-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@email.com">
    </div>
    <div class="input-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Your password">
    </div>
    <button class="btn-primary" id="loginBtn" onclick="doLogin()">Sign In</button>
    <div class="divider">or</div>
    <button class="btn-secondary" onclick="openUrl('/register')">Create Account</button>
  </div>

  <!-- Main view (shown when logged in) -->
  <div id="mainView">
    <div class="connected-info" id="connectedInfo"></div>
    <button class="btn-primary" id="connectBtn" onclick="connectInstagram()">
      Connect Instagram
    </button>
    <div class="links">
      <a href="#" onclick="openUrl('/relationships/' + igUser)">Relationships</a>
      <a href="#" onclick="openUrl('/unfollowers/' + igUser)">Unfollowers</a>
      <a href="#" onclick="openUrl('/advisor/' + igUser)">Advisor</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
