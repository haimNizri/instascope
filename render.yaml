services:
  - type: web
    name: instascope
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: instascope-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.13.2"

databases:
  - name: instascope-db
    plan: free
    databaseName: instascope
